name: find_your_two
description: "FindYourTwo – Volunteer & Charity Platform"
publish_to: 'none'
version: 1.0.4+8

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Networking
  http: ^1.2.2

  # Environment Variables
  flutter_dotenv: ^5.2.1

  # Secure Storage (JWT tokens)
  flutter_secure_storage: ^9.2.4

  # Local Notifications
  flutter_local_notifications: ^18.0.1

  # Image caching
  cached_network_image: ^3.4.1

  # SVG support
  flutter_svg: ^2.0.17

  # URL launcher
  url_launcher: ^6.3.1

  # Share functionality (referrals)
  share_plus: ^10.1.4

  # Intl for date formatting
  intl: ^0.20.2

  # Google Fonts
  google_fonts: ^8.0.2

  iconly:
    path: packages/iconly

  # Shared Preferences (onboarding flag)
  shared_preferences: ^2.3.5
  persistent_bottom_nav_bar: ^6.2.1
  mobile_scanner: ^7.2.0
  geolocator: ^14.0.2
  image_picker: ^1.2.1
  geocoding: ^4.0.0
  google_maps_flutter: ^2.17.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  firebase_messaging: ^16.2.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  app_links: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app-icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/fonts/
